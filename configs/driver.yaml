# driver config — periodically flaps interfaces via gNMI Set.
# In k8s this is the contents of a ConfigMap mounted into the driver Deployment.

gnmi:
  port: 57400
  username: admin
  password: NokiaSrl1!
  skip_verify: true
  insecure: false
  encoding: json_ietf
  dial_timeout: 10s
  # sample_interval is unused by the driver; kept here so the gnmi block has
  # the same shape across services.
  sample_interval: 5s

# Hosts to drive. Address only — port comes from gnmi.port (override inline
# by writing "host:port"). The driver dials hosts concurrently.
hosts:
  - srlinux
  # - srlinux-2

# Which interfaces to flap on every host, and how often.
flap:
  enabled: true
  interval: 10s
  interfaces:
    - ethernet-1/1
